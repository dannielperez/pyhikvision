name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # for trusted publishing to PyPI

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Configure a "release" environment with a Trusted Publisher on PyPI,
        # or remove this step and use a PyPI API token via twine upload.
